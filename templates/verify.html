{% extends 'base.html' %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-lg border border-gray-100">
        <div>
            <div class="mx-auto h-12 w-12 bg-blue-100 rounded-full flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
                Verify your account
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                A 6-digit verification code was sent to <span class="font-semibold text-gray-800">{{ email }}</span>.
            </p>
            <div class="mt-4 p-3 bg-blue-50 rounded-lg text-xs text-blue-800 text-center border border-blue-100">
                For local development, check your <strong>Flask console / terminal output</strong> to retrieve the simulated email's verification code!
            </div>
        </div>
        
        <form class="mt-6 space-y-6" action="{{ url_for('verify') }}" method="POST">
            <input type="hidden" name="email" value="{{ email }}">
            <div>
                <label for="code" class="sr-only">Verification Code</label>
                <input id="code" name="code" type="text" maxlength="6" required class="appearance-none rounded-md relative block w-full px-3 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-center font-bold tracking-widest text-2xl" placeholder="000000">
            </div>

            <div>
                <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition shadow-md">
                    Verify & Activate Account
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
