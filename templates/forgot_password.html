<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Indus Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
    </style>
</head>
<body class="p-4">

    <!-- Main Container -->
    <div class="bg-white rounded-[24px] shadow-2xl w-full max-w-[1050px] min-h-[620px] flex flex-col md:flex-row overflow-hidden border border-gray-100">
        
        <!-- Left Section -->
        <div class="w-full md:w-1/2 bg-gradient-to-br from-[#dbeafe] to-[#2563eb] p-10 md:p-14 flex flex-col justify-center text-blue-900 relative">
            <h1 class="text-4xl md:text-5xl font-bold mb-3 tracking-tight">Welcome Back</h1>
            <p class="text-blue-800 text-lg mb-10 font-medium">Access your School student dashboard</p>
        </div>

        <!-- Right Section (Forgot Password Form) -->
        <div class="w-full md:w-1/2 p-10 md:p-14 flex flex-col justify-center bg-white relative">
            <div class="max-w-sm w-full mx-auto">
                <!-- Branding -->
                <div class="text-center mb-6">
                    <div class="flex justify-center mb-3 mt-4">
                        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Indus Logo" class="h-28 mx-auto mb-2 object-contain">
                    </div>
                    <h2 class="text-xs font-bold text-blue-800 tracking-widest uppercase mb-4">Indus Personalized Learning</h2>
                </div>

                <h2 class="text-3xl font-bold text-gray-900 mb-6 text-center">Log In</h2>

                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        {% for message in messages %}
                            <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg mb-6 text-sm text-center font-medium">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form action="{{ url_for('forgot_password') }}" method="POST" class="space-y-5">
                    
                    <!-- Email -->
                    <div>
                        <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                        <input type="email" id="email" name="email" required 
                            class="w-full bg-white border border-gray-300 rounded-lg px-4 py-3 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#2563eb] focus:border-[#2563eb] transition-all"
                            placeholder="Enter your registered email">
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" 
                        class="w-full bg-[#2563eb] hover:bg-blue-600 text-white font-bold py-3.5 px-4 rounded-lg transition-all duration-200 shadow-md mt-6">
                        Send Reset Link
                    </button>
                    
                    <!-- Back to Login Button -->
                    <a href="{{ url_for('login') }}" 
                        class="w-full border border-gray-300 text-gray-600 font-semibold py-3.5 px-4 rounded-lg transition-all duration-200 mt-4 flex items-center justify-center hover:bg-gray-50">
                        <i class="fa-solid fa-arrow-left mr-2"></i> Back to Login
                    </a>

                </form>
            </div>
        </div>
    </div>

</body>
</html>
