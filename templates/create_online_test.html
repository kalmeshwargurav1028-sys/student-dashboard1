{% extends "base.html" %}

{% block header_title %}Create Online Test{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="bg-white dark:bg-gray-800 shadow sm:rounded-lg p-6">
        <h2 class="text-xl font-bold mb-6 text-gray-900 dark:text-white">Create a New Online Test</h2>
        
        <form method="POST" action="{{ url_for('create_online_test') }}" enctype="multipart/form-data" onsubmit="return prepareQuestions()">
            <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-2 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Test Title</label>
                    <input type="text" name="title" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Subject</label>
                    <input type="text" name="subject" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Target Grade</label>
                    <select name="target_class" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500">
                        <option value="1st">1st Standard</option>
                        <option value="2nd">2nd Standard</option>
                        <option value="3rd">3rd Standard</option>
                        <option value="4th">4th Standard</option>
                        <option value="5th">5th Standard</option>
                        <option value="6th">6th Standard</option>
                        <option value="7th">7th Standard</option>
                        <option value="8th">8th Standard</option>
                        <option value="9th">9th Standard</option>
                        <option value="10th">10th Standard</option>
                        <option value="11th">11th Standard</option>
                        <option value="12th">12th Standard</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Duration (Minutes)</label>
                    <input type="number" name="duration" value="60" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div class="sm:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Attach Question Paper (Optional PDF)</label>
                    <input type="file" name="pdf_file" accept=".pdf" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500">
                    <p class="mt-1 text-xs text-gray-500">Upload a PDF question paper if you want students to refer to a document while taking the test.</p>
                </div>
            </div>

            <hr class="mb-6">
            <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">Questions</h3>
            
            <div class="flex items-center space-x-2 mb-4 bg-gray-50 dark:bg-gray-700 p-3 rounded-lg border border-gray-200 dark:border-gray-600">
                <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Quick Setup:</label>
                <input type="number" id="bulk-q-count" placeholder="No. of questions (e.g. 25)" class="border border-gray-300 dark:border-gray-600 rounded-md py-1 px-3 w-48 text-sm dark:bg-gray-800 dark:text-white" min="1" max="100">
                <button type="button" onclick="generateBulkQuestions()" class="px-3 py-1 bg-indigo-100 text-indigo-700 hover:bg-indigo-200 rounded-md text-sm font-bold shadow-sm transition-colors">Generate Blank Blocks</button>
                <span class="text-xs text-gray-500 ml-2">(Automatically divides 100 marks)</span>
            </div>
            
            <div id="questions-container" class="space-y-4 mb-6"></div>
            
            <button type="button" onclick="addQuestion()" class="mb-6 px-4 py-2 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                + Add Single Question
            </button>

            <input type="hidden" name="questions_json" id="questions_json">

            <div class="flex justify-end pt-4 border-t border-gray-200">
                <button type="submit" class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700">
                    Publish Test (100 Marks)
                </button>
            </div>
        </form>
    </div>
</div>

<script>
let questionCount = 0;

function addQuestion(defaultMarks = 10, defaultText = '') {
    const container = document.getElementById('questions-container');
    const qDiv = document.createElement('div');
    qDiv.className = 'p-4 border border-gray-200 dark:border-gray-700 rounded-md question-block bg-gray-50 dark:bg-gray-800/50';
    qDiv.innerHTML = `
        <label class="block text-sm font-medium mb-1 dark:text-gray-300">Question Text</label>
        <input type="text" class="q-text block w-full border border-gray-300 dark:border-gray-600 rounded-md py-2 px-3 mb-3 dark:bg-gray-700 dark:text-white" value="${defaultText}">
        <div class="flex gap-4">
            <div class="flex-1">
                <label class="block text-sm font-medium mb-1 dark:text-gray-300">Correct Answer</label>
                <input type="text" class="q-ans block w-full border border-gray-300 dark:border-gray-600 rounded-md py-2 px-3 dark:bg-gray-700 dark:text-white">
            </div>
            <div class="w-24">
                <label class="block text-sm font-medium mb-1 dark:text-gray-300">Marks</label>
                <input type="number" class="q-marks block w-full border border-gray-300 dark:border-gray-600 rounded-md py-2 px-3 dark:bg-gray-700 dark:text-white" value="${defaultMarks}">
            </div>
        </div>
        <button type="button" onclick="this.parentElement.remove()" class="mt-2 text-sm font-bold text-red-600 hover:text-red-800">Remove</button>
    `;
    container.appendChild(qDiv);
    questionCount++;
}

function generateBulkQuestions() {
    const count = parseInt(document.getElementById('bulk-q-count').value);
    if (!count || count <= 0) return;
    
    if(!confirm(`This will clear any existing questions and generate ${count} new blank blocks. Continue?`)) return;
    
    document.getElementById('questions-container').innerHTML = '';
    questionCount = 0;
    
    const marksPerQ = Math.floor(100 / count);
    const remainder = 100 % count;
    
    for (let i = 0; i < count; i++) {
        let marks = marksPerQ;
        // Add the remainder to the very first question so it all adds up to 100
        if (i === 0) marks += remainder; 
        
        addQuestion(marks, `Question ${i+1}`);
    }
}

function prepareQuestions() {
    const questions = [];
    document.querySelectorAll('.question-block').forEach(block => {
        questions.push({
            question_text: block.querySelector('.q-text').value,
            correct_answer: block.querySelector('.q-ans').value,
            marks: parseInt(block.querySelector('.q-marks').value) || 0
        });
    });
    document.getElementById('questions_json').value = JSON.stringify(questions);
    
    const totalMarks = questions.reduce((sum, q) => sum + q.marks, 0);
    const hasPdf = document.querySelector('input[name="pdf_file"]').files.length > 0;
    
    if (questions.length > 0 && totalMarks !== 100) {
        showToast('Total marks must be exactly 100 across your question blocks. Current total: ' + totalMarks);
        return false;
    } else if (questions.length === 0 && !hasPdf) {
        showToast('Please either generate question blocks or attach a PDF question paper.');
        return false;
    }
    
    return true;
}

// No default question, start blank
</script>
{% endblock %}
