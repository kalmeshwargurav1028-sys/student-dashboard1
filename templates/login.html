<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Indus Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Main Container -->
    <div class="max-w-5xl w-full flex flex-col md:flex-row bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100 h-auto md:h-[600px]">
        
        <!-- Left Section -->
        <div class="w-full md:w-1/2 bg-gradient-to-br from-[#dbeafe] to-[#3b82f6] p-10 md:p-14 flex flex-col justify-center text-blue-900 relative">
            <h1 class="text-4xl md:text-5xl font-bold mb-3 tracking-tight">Welcome Back</h1>
            <p class="text-blue-800 text-lg mb-10 font-medium">Access your School student dashboard</p>


        </div>

        <!-- Right Section (Login Form) -->
        <div class="w-full md:w-1/2 p-10 md:p-14 flex flex-col justify-center items-center bg-white">
            
            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="flex justify-center mb-3">
                    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Indus International School Logo" class="h-20 w-auto object-contain">
                </div>
                <h2 class="text-xs font-bold text-blue-800 tracking-widest uppercase mb-4">Indus Personalized Learning</h2>
                <h2 class="text-3xl font-bold text-gray-900 tracking-tight">Log In</h2>
            </div>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <div class="w-full max-w-sm bg-red-50 border border-red-200 text-red-600 px-4 py-2 rounded-xl mb-6 text-sm text-center">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('login') }}" method="POST" class="w-full max-w-sm space-y-5">
                
                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-semibold text-gray-700 mb-1.5">Email</label>
                    <input type="email" id="email" name="email" required 
                        class="w-full bg-blue-50/50 border border-gray-200 rounded-lg px-4 py-3.5 text-gray-900 placeholder-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"
                        placeholder="kalmeshwargurav1028@gmail.com">
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
                    <div class="relative">
                        <input type="password" id="password" name="password" required 
                            class="w-full bg-blue-50/50 border border-gray-200 rounded-lg pl-4 pr-12 py-3.5 text-gray-900 placeholder-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"
                            placeholder="•••••">
                        <div onclick="const p=document.getElementById('password'); const i=document.getElementById('toggleIcon'); if(p.type==='password'){p.type='text'; i.classList.remove('fa-eye'); i.classList.add('fa-eye-slash');}else{p.type='password'; i.classList.remove('fa-eye-slash'); i.classList.add('fa-eye');}" class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer z-20">
                            <i class="fa-regular fa-eye text-gray-400 hover:text-gray-600 text-lg" id="toggleIcon"></i>
                        </div>
                    </div>
                </div>



                <!-- Login Button -->
                <button type="submit" 
                    class="w-full mt-8 bg-[#3b82f6] hover:bg-blue-600 text-white font-bold py-3.5 px-4 rounded-lg transition-all duration-200 flex items-center justify-center tracking-wide uppercase text-sm">
                    LOGIN <i class="fa-solid fa-arrow-right ml-2 text-xs"></i>
                </button>
            </form>

            <!-- Links -->
            <div class="mt-8 text-center space-y-4 w-full">
                <a href="{{ url_for('forgot_password') }}" class="flex items-center justify-center text-sm text-[#3b82f6] hover:text-blue-700 font-medium transition-colors">
                    <i class="fa-solid fa-key mr-2"></i> Forgot Password
                </a>
                <a href="#" class="flex items-center justify-center text-sm text-red-500 hover:text-red-600 font-medium transition-colors">
                    <i class="fa-regular fa-circle-question mr-2"></i> Need help?
                </a>
            </div>

            <!-- Optional signup link since it was in the original template, though not in the screenshot -->
            <div class="mt-4 text-center">
                <a href="{{ url_for('signup') }}" class="text-xs text-gray-500 hover:text-gray-700 underline">Create New Account</a>
            </div>
            
        </div>
    </div>

    <script>
        // Inline JS used for password toggle
    </script>
</body>
</html>
