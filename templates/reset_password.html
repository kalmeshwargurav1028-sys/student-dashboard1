<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - Indus Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #eaf8f1; /* Soft mint/greenish background */
            min-height: 100vh;
        }
    </style>
</head>
<body class="flex items-center justify-center py-10 px-4">

    <div class="bg-white rounded-2xl w-full max-w-md p-10 text-gray-800 transition-all duration-300 shadow-2xl shadow-gray-200/50">
        
        <!-- Header / Branding -->
        <div class="text-center mb-6">
            <div class="flex justify-center mb-3">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Indus International School Logo" class="h-20 w-auto object-contain">
            </div>
            <h2 class="text-xs font-bold text-blue-800 tracking-widest uppercase mb-4">Indus Personalized Learning</h2>
            <h1 class="text-2xl font-bold tracking-tight text-gray-900 mb-2">Set New Password</h1>
            <p class="text-gray-500 text-sm">Enter the code sent to <br><span class="font-bold text-gray-800">{{ email }}</span> and your new password</p>
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg mb-6 text-sm text-center font-medium">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('reset_password') }}" method="POST" class="space-y-4" onsubmit="return validatePassword()">
            <input type="hidden" name="email" value="{{ email }}">
            
            <div>
                <label for="otp" class="block text-xs font-semibold text-gray-600 mb-1.5">Reset Code</label>
                <input type="text" id="otp" name="otp" required maxlength="6" pattern="\d{6}"
                    class="w-full bg-white border border-gray-200 rounded-lg px-4 py-2.5 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all font-mono tracking-widest"
                    placeholder="123456">
            </div>

            <div>
                <label for="password" class="block text-xs font-semibold text-gray-600 mb-1.5">New Password</label>
                <input type="password" id="password" name="password" required 
                    class="w-full bg-white border border-gray-200 rounded-lg px-4 py-2.5 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"
                    placeholder="••••••••">
            </div>

            <div>
                <label for="confirm_password" class="block text-xs font-semibold text-gray-600 mb-1.5">Retype New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required 
                    class="w-full bg-white border border-gray-200 rounded-lg px-4 py-2.5 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"
                    placeholder="••••••••">
                <p id="password_error" class="text-red-500 text-xs mt-2 hidden font-medium">Passwords do not match.</p>
            </div>

            <button type="submit" 
                class="w-full bg-[#2563eb] hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-all duration-200 mt-6 text-sm shadow-md">
                Change Password
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-xs text-gray-500 font-medium">
                <a href="{{ url_for('login') }}" class="text-[#2563eb] font-bold hover:text-blue-800 transition-colors">Back to Login</a>
            </p>
        </div>
    </div>

    <script>
        function validatePassword() {
            var password = document.getElementById("password").value;
            var confirmPassword = document.getElementById("confirm_password").value;
            var errorElement = document.getElementById("password_error");
            
            if (password != confirmPassword) {
                errorElement.classList.remove("hidden");
                return false;
            }
            errorElement.classList.add("hidden");
            return true;
        }
    </script>
</body>
</html>
