<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ student.name }} - ID Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            body {
                background-color: white !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .no-print {
                display: none !important;
            }
            .id-card {
                box-shadow: none !important;
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center py-12">
    <div class="no-print absolute top-6 left-6 flex gap-4">
        <a href="{{ url_for('student_profile', student_id=student.id) }}" class="inline-flex items-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-gray-600 hover:bg-gray-700 transition">
            &larr; Back to Profile
        </a>
        <button onclick="window.print()" class="inline-flex items-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 transition">
            <svg class="mr-2 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
            Print ID Card
        </button>
    </div>

    <!-- ID Card Container -->
    <div class="id-card bg-white shadow-xl rounded-[10px] w-[300px] overflow-hidden flex flex-col relative border border-gray-200" style="height: 480px; font-family: 'Times New Roman', Times, serif;">
        
        <!-- Header -->
        <div class="text-center pt-6 pb-2 px-4 relative">
            <div class="flex justify-center mb-1">
                <div class="h-24 w-auto flex items-center justify-center">
                    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Indus International School Logo" class="h-full w-full object-contain">
                </div>
            </div>
        </div>

        <!-- Photo -->
        <div class="flex justify-center my-3 relative z-10">
            <div class="w-[120px] h-[140px] rounded-lg border-[3px] border-gray-200 overflow-hidden bg-white shadow-sm flex items-center justify-center">
                {% if student.get('photo_url') %}
                    <img src="{{ student.get('photo_url') }}" alt="Student Photo" class="w-full h-full object-cover">
                {% else %}
                    <span class="text-5xl font-bold text-gray-400">{{ student.name[0] }}</span>
                {% endif %}
            </div>
        </div>

        <!-- Details -->
        <div class="text-center px-4 mb-4 flex-1 flex flex-col justify-center font-sans">
            <h4 class="font-bold text-gray-900 text-[18px] leading-tight mb-1">{{ student.name }}</h4>
            <p class="text-gray-700 font-semibold text-sm">Class {{ student.get('student_class', 'N/A') }} - {{ student.get('division', 'A') }}</p>
            <p class="text-gray-500 font-medium text-sm mt-0.5 uppercase">ID: {{ student.id }}</p>
        </div>

        <!-- Footer -->
        <div class="px-6 pb-6 flex flex-col items-end w-full relative mt-auto font-sans">
            <div class="w-28 border-b border-gray-800 mb-1 relative flex justify-center h-8">
                <!-- Signature placeholder -->
                <img src="https://upload.wikimedia.org/wikipedia/commons/f/f8/Stylized_signature_sample.svg" alt="Signature" class="h-8 absolute bottom-0 object-contain opacity-70">
            </div>
            <p class="text-[10px] font-bold text-gray-800 text-center w-28 uppercase tracking-wider">Authorised Signatory</p>
        </div>
    </div>
</body>
</html>
